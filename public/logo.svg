<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5CA0FF"/>
      <stop offset="55%" stop-color="#006AFF"/>
      <stop offset="100%" stop-color="#0047B3"/>
    </linearGradient>
    <filter id="bubbleShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="3.5" stdDeviation="3.2" flood-color="#00224D" flood-opacity="0.4"/>
    </filter>
    <filter id="bubbleGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="letterEmboss" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="1.4" stdDeviation="0.9" flood-color="#00224D" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g filter="url(#bubbleShadow)">
    <rect x="12" y="12" width="76" height="52" rx="18" fill="url(#bubbleGrad)"/>
    <polygon points="24,64 24,80 40,64" fill="url(#bubbleGrad)"/>
  </g>
  <ellipse cx="34" cy="24" rx="24" ry="12" fill="#FFFFFF" opacity="0.32" filter="url(#bubbleGlow)"/>
  <polyline points="28,27 37,50 49,35 61,50 72,27" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#letterEmboss)"/>
</svg>
